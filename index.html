<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GACHAPANIC_COLLECTION v1.0</title>
<style>
@font-face { font-family: 'BetterVCR'; src: url('marzigacha/better-vcr.woff') format('woff'); }
body {
background-color: #000;
background-image: url('marzigacha/pattern.jpg');
background-repeat: repeat;
color: #21ff7a; font-family: 'BetterVCR', monospace; padding: 20px; cursor: crosshair;
}
.header-panel { border: none !important; padding: 20px; margin-bottom: 20px; text-align: center; background: transparent !important; }
.window {
border: 4px solid #ff21b9; background: #1a1a1a !important; margin-bottom: 20px;
display: none; position: relative;
margin-top: 20px;
overflow: visible;
}
.window.active { display: block; }
.win-header {
background: #ff21b9; color: #fff; padding: 10px; font-weight: bold; font-size: 1.5em;
display: flex; justify-content: space-between; align-items: center;
position: relative; z-index: 2;
}
.window-controls { display: flex; gap: 8px; position: relative; z-index: 3; }
.win-btn {
width: 25px; height: 25px; border: 2px solid #fff;
display: flex; align-items: center; justify-content: center;
font-size: 16px; cursor: default; background: rgba(0,0,0,0.2);
}
@keyframes shadow-glitch { 0%, 100% { text-shadow: 2px 0 #ff21b9, -2px 0 #050df2; } 50% { text-shadow: -2px 0 #ff21b9, 2px 0 #050df2; } }
@keyframes border-glitch { 0%, 100% { box-shadow: 0 0 0 transparent; } 30% { box-shadow: 3.5px 0 #050df2, -3.5px 0 #ff21b9; } 70% { box-shadow: -3.5px 0 #050df2, 3.5px 0 #ff21b9; } }
@keyframes ultra-shadow-glitch { 0%, 100% { text-shadow: 2px 0 #050df2, -2px 0 #050df2; } 50% { text-shadow: -2px 0 #050df2, 2px 0 #050df2; } }
@keyframes ultra-border-glitch { 0%, 100% { box-shadow: 0 0 0 transparent; } 30% { box-shadow: 3.5px 0 #050df2, -3.5px 0 #050df2; } 70% { box-shadow: -3.5px 0 #050df2, 3.5px 0 #050df2; } }
.glitch-text { animation: shadow-glitch 3s infinite ease-in-out; color: #fff; display: inline-block; }
.ultra-text { animation: ultra-shadow-glitch 3s infinite ease-in-out; color: #fff; display: inline-block; }
.epic-border { animation: border-glitch 3s infinite ease-in-out; border: 3px solid #fff !important; }
.ultra-border { animation: ultra-border-glitch 3s infinite ease-in-out; border: 3px solid #ff21b9 !important; }
input { padding: 15px; background: #000; border: 2px solid #21ff7a; color: #21ff7a; font-family: 'BetterVCR'; font-size: 1.5em; width: 300px; text-align: center; }
button { padding: 15px 25px; cursor: pointer; background: #050df2; color: #fff; border: 2px solid #ff21b9; font-family: 'BetterVCR'; font-size: 1.2em; transition: 0.2s; }
button:hover { background: #21ff7a; color: #000; }
.top-list { list-style: none; padding: 20px; font-size: 2em; }
.top-item { cursor: pointer; padding: 10px; border-bottom: 2px solid #050df2; }
.top-item:hover { color: #fff; background: #050df2; }
.rarity-section { margin-bottom: 50px; padding: 20px; border: 3px dashed; }
.shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
.card { padding: 20px; text-align: center; background: #000; display: flex; flex-direction: column; align-items: center; border: 3px solid; overflow: hidden; position: relative; }
.card img { width: 180px; height: 180px; image-rendering: pixelated; object-fit: contain; }
.duplicate-badge { position: absolute; top: 10px; right: 10px; background: transparent; padding: 2px 6px; font-size: 1.2em; border: 2px solid; }
.spoiler-btn { background: #000; border: 2px solid #21ff7a; color: #21ff7a; cursor: pointer; padding: 10px; margin-top: 15px; font-family: 'BetterVCR'; font-size: 1.2em; width: 100%; }
.hidden-name { display: none; font-size: 1.4em; margin-top: 15px; color: #fff; }
.reward-name { font-size: 1.4em; margin-top: 15px; color: #fff; }
.loading { text-align: center; padding: 20px; font-size: 1.4em; color: #21ff7a; width: 100%; }
</style>
</head>
<body>
<div class="header-panel">
<input type="text" id="userInput" placeholder="TWITCH_USERNAME">
<button onclick="showWindow('top-window')">TOP_LIST</button>
</div>
<div id="top-window" class="window active">
<div class="win-header">
TOP_MARZI_COLLECTORS
<div class="window-controls"><div class="win-btn">_</div><div class="win-btn">□</div><div class="win-btn">×</div></div>
</div>
<div id="top-list"><div class="loading">LOADING...</div></div>
</div>
<div id="shelf-window" class="window">
<div class="win-header" id="shelf-header">
COLLECTION
<div class="window-controls"><div class="win-btn">_</div><div class="win-btn">□</div><div class="win-btn">×</div></div>
</div>
<div id="shelf-container" style="padding: 20px;"><div class="loading">LOADING...</div></div>
</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwRh1t-Sp18Zk5K41L2ERcrwK9Qk77Ex-wn2SyQudzTlbNyjx9CNlTL6TFTtFuhrXtc-w/exec';
const SITE_BASE = 'https://marzipanica.github.io/marzi-shelf/';

async function getTableData() {
    const response = await fetch(API_URL);
    return await response.json();
}

document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') loadUserShelf(e.target.value); });

const rarityColors = { epic: '#ffffff', ultrarare: '#ff21b9', rare: '#050df2', common: '#21ff7a' };
const sectionBorderColors = { epic: '#ff21b9', ultrarare: '#050df2', rare: '#21ff7a', common: '#ff21b9' };

function toggleSpoiler(btn) { btn.style.display = 'none'; btn.nextElementSibling.style.display = 'block'; }

async function loadUserShelf(twitch_username) {
    if(!twitch_username) return;
    document.getElementById('shelf-header').firstChild.textContent = `${twitch_username.toUpperCase()}_COLLECTION`;
    showWindow('shelf-window');
    const container = document.getElementById('shelf-container');
    container.innerHTML = '<div class="loading">LOADING...</div>';
    
    const { items, stats } = await getTableData();
    
    // Ищем строку юзера
    const userRow = stats.find(row => row[0].toLowerCase() === twitch_username.toLowerCase());
    
    container.innerHTML = '';
    
    // Группируем предметы по редкости, используя данные из листа Items
    const groupedItems = {};
    items.slice(1).forEach(row => {
        const name = row[0];
        const rarity = row[1].toLowerCase();
        const url = row[2];
        if(!groupedItems[rarity]) groupedItems[rarity] = [];
        groupedItems[rarity].push({ name, url });
    });

    Object.keys(rarityColors).forEach(r => {
        if(!groupedItems[r]) return;
        
        const section = document.createElement('div');
        section.className = 'rarity-section';
        section.style.borderColor = sectionBorderColors[r];
        
        let foundCount = 0;
        let shelfHTML = '';
        
        groupedItems[r].forEach(item => {
            const itemIndex = stats[0].indexOf(item.name);
            const count = userRow ? (parseInt(userRow[itemIndex]) || 0) : 0;
            if(count > 0) foundCount++;
            
            shelfHTML += `
            <div class="card ${r === 'epic' ? 'epic-border' : r === 'ultrarare' ? 'ultra-border' : ''}" style="border-color: ${rarityColors[r]}">
                ${count > 1 ? `<div class="duplicate-badge" style="border-color: ${rarityColors[r]}; color: ${rarityColors[r]}">x${count}</div>` : ''}
                <img src="${count > 0 ? SITE_BASE + item.url : SITE_BASE + 'marzigacha/BLANK.gif'}">
                ${count > 0 ? `<p class="reward-name">${item.name}</p>` : `<button class="spoiler-btn" onclick="toggleSpoiler(this)">[SHOW_NAME]</button><p class="hidden-name">${item.name}</p>`}
            </div>
            `;
        });
        
        section.innerHTML = `<h2 style="color: ${rarityColors[r]}" class="${r === 'epic' ? 'glitch-text' : r === 'ultrarare' ? 'ultra-text' : ''}">[${r.toUpperCase()}]_${foundCount}/${groupedItems[r].length}</h2><div class="shelf">${shelfHTML}</div>`;
        container.appendChild(section);
    });
}

async function renderTop() {
    const { stats } = await getTableData();
    const totals = [];
    for(let i = 1; i < stats.length; i++) {
        let sum = 0;
        for(let j = 1; j < stats[i].length; j++) sum += (parseInt(stats[i][j]) || 0);
        totals.push({ name: stats[i][0], count: sum });
    }
    totals.sort((a,b) => b.count - a.count);
    document.getElementById('top-list').innerHTML = `<ul class="top-list">` + totals.map(i => `<li class="top-item" onclick="loadUserShelf('${i.name}')">> ${i.name} [${i.count}]</li>`).join('') + `</ul>`;
}
renderTop();
function showWindow(id) { document.querySelectorAll('.window').forEach(w => w.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
