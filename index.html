<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Полочка Марци</title>
    <style>
        body { background: #090b0e; color: white; font-family: sans-serif; padding: 40px; }
        h1 { text-align: center; color: #a0aec0; }
        .controls { text-align: center; margin-bottom: 30px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        
        .rarity-section { margin-bottom: 40px; }
        .rarity-title { padding-bottom: 10px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { background: #131722; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #2d3748; position: relative; }
        .card.locked { filter: grayscale(1) opacity(0.5); }
        .card img { width: 80px; height: 80px; object-fit: contain; }
        .count { position: absolute; top: 5px; right: 5px; background: #e74c3c; padding: 2px 8px; border-radius: 50%; font-size: 10px; }
        
        .text-common { color: #2ecc71; }
        .text-rare { color: #3498db; }
        .text-ultrarare { color: #9b59b6; }
        .text-epic { color: #e67e22; }
    </style>
</head>
<body>
    <h1>Полочка Марци</h1>
    <div class="controls">
        <input type="text" id="userInput" placeholder="Введи ник...">
        <button onclick="loadShelf()">Показать</button>
    </div>
    <div id="shelf-container"></div>

    <script>
        const SITE_BASE = 'https://marzipanica.github.io/marzi-shelf/';
        
        // Сюда перенесены пути из твоего JS-скрипта
        const ALL_ITEMS = {
            epic: [
                { name: "Biblically Accurate Marzi", url: "marzigacha/ANGEL.gif" },
                { name: "Bunny Marzi", url: "marzigacha/BUNNY.gif" },
                { name: "Sailor Marzi", url: "marzigacha/SAILOR.gif" },
                { name: "N7 Marzi", url: "marzigacha/n7.gif" },
                { name: "Succubus Marzi", url: "marzigacha/suc.gif" }
            ],
            ultrarare: [
                { name: "Diamond Marzi", url: "marzigacha/DIAMOND.gif" },
                { name: "Holographic Marzi", url: "marzigacha/HOLO.gif" },
                { name: "Golden Marzi", url: "marzigacha/GOLDEN.gif" },
                { name: "Bad Signal Marzi", url: "marzigacha/BADSIGNAL.gif" }
            ],
            rare: [
                { name: "Eva Marzi", url: "marzigacha/EVA.gif" },
                { name: "Bubblegum Marzi", url: "marzigacha/BUBBLEGUM.gif" },
                { name: "Haunted Marzi", url: "marzigacha/HAUNTED.gif" },
                { name: "Rusty Marzi", url: "marzigacha/RUSTY.gif" },
                { name: "Midnight Marzi", url: "marzigacha/MIDNIGHT.gif" },
                { name: "Noir Marzi", url: "marzigacha/NOIR.gif" },
                { name: "Inverted Marzi", url: "marzigacha/INVERTED.gif" },
                { name: "Acid Marzi", url: "marzigacha/ACID.gif" },
                { name: "Pumpkin Marzi", url: "marzigacha/PUMPKIN.gif" },
                { name: "Albino Marzi", url: "marzigacha/ALBINIO.gif" }
            ],
            common: [
                { name: "Default Marzi", url: "marzigacha/Default.gif" },
                { name: "Upside down Marzi", url: "marzigacha/upside down.gif" },
                { name: "Micro Marzi", url: "marzigacha/MICRO MARZI.gif" },
                { name: "Wide Marzi", url: "marzigacha/WIDE.gif" },
                { name: "LeftHalf Marzi", url: "marzigacha/LEFT.gif" },
                { name: "RightHalf Marzi", url: "marzigacha/RIGHT.gif" },
                { name: "Barrel Marzi", url: "marzigacha/BARREL.gif" },
                { name: "Pincushion Marzi", url: "marzigacha/PINCUSSION.gif" },
                { name: "Big-Eyed Marzi", url: "marzigacha/BIG-EYED.gif" },
                { name: "Tiny-Eyed Marzi", url: "marzigacha/TINY-EYED.gif" },
                { name: "TopHalf Marzi", url: "marzigacha/top.gif" },
                { name: "BottomHalf Marzi", url: "marzigacha/bottom.gif" }
            ]
        };

        const rarityOrder = ['epic', 'ultrarare', 'rare', 'common'];

        async function loadShelf() {
            const user = document.getElementById('userInput').value.toLowerCase();
            const container = document.getElementById('shelf-container');
            const res = await fetch('https://sheetdb.io/api/v1/4pzptctzinluq');
            const data = await res.json();
            
            const userFound = data.filter(i => i.Ник.toLowerCase() === user);
            const inventory = {};
            userFound.forEach(i => {
                const r = (i.Редкость || 'common').toLowerCase();
                if (!inventory[r]) inventory[r] = {};
                inventory[r][i.Предмет] = (inventory[r][i.Предмет] || 0) + 1;
            });
            
            container.innerHTML = '';
            rarityOrder.forEach(r => {
                const totalPool = ALL_ITEMS[r];
                const foundItems = inventory[r] || {};
                const foundCount = Object.keys(foundItems).length;
                
                container.innerHTML += `
                    <div class="rarity-section">
                        <h2 class="rarity-title text-${r}">
                            <span>${r.toUpperCase()}</span>
                            <span>${foundCount} / ${totalPool.length}</span>
                        </h2>
                        <div class="shelf" id="shelf-${r}"></div>
                    </div>
                `;
                
                const shelf = document.getElementById(`shelf-${r}`);
                totalPool.forEach(item => {
                    const count = foundItems[item.name] || 0;
                    shelf.innerHTML += `
                        <div class="card ${count === 0 ? 'locked' : ''}">
                            ${count > 0 ? `<span class="count">${count}</span>` : ''}
                            <img src="${SITE_BASE + item.url}" onerror="this.src='https://via.placeholder.com/80'">
                            <p style="font-size: 10px;">${count === 0 ? '???' : item.name}</p>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
