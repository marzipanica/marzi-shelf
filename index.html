<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MARZI_OS v1.0</title>
    <style>
        @font-face { font-family: 'BetterVCR'; src: url('marzigacha/better-vcr.woff') format('woff'); }
        body { background-color: #000; color: #21ff7a; font-family: 'BetterVCR', monospace; padding: 20px; cursor: crosshair; }
        
        /* Анимация для Эпика */
        @keyframes epic-glow {
            0% { box-shadow: 0 0 5px #fff; border-color: #fff; }
            50% { box-shadow: 0 0 20px #fff; border-color: #aaa; }
            100% { box-shadow: 0 0 5px #fff; border-color: #fff; }
        }

        .header-panel { border: 3px solid #050df2; padding: 20px; margin-bottom: 20px; text-align: center; background: #0a0a0a; }
        input { padding: 15px; background: #000; border: 2px solid #21ff7a; color: #21ff7a; font-family: 'BetterVCR'; font-size: 1.5em; width: 300px; text-align: center; }
        button { padding: 15px 25px; cursor: pointer; background: #050df2; color: #fff; border: 2px solid #ff21b9; font-family: 'BetterVCR'; font-size: 1.2em; }
        
        .window { border: 4px solid #ff21b9; background: #000; margin-bottom: 20px; display: none; }
        .window.active { display: block; }
        .win-header { background: #ff21b9; color: #fff; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; font-size: 1.5em; }
        
        /* Стили карточек по редкости */
        .card-common { border: 2px dashed #21ff7a !important; }
        .card-rare { border: 3px solid #050df2 !important; }
        .card-ultrarare { border: 3px solid #ff21b9 !important; }
        .card-epic { animation: epic-glow 1.5s infinite alternate; }

        .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .card { padding: 20px; text-align: center; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; }
        .card img { width: 180px; height: 180px; image-rendering: pixelated; object-fit: contain; }
        
        .spoiler-btn { background: #000; border: 2px solid #21ff7a; color: #21ff7a; cursor: pointer; padding: 10px; margin-top: 15px; font-family: 'BetterVCR'; font-size: 1.2em; width: 100%; }
        .hidden-name { display: none; font-size: 1.4em; margin-top: 15px; color: #fff; }
        .reward-name { font-size: 1.4em; margin-top: 15px; color: #fff; }
        
        .taskbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #050df2; padding: 15px; display: flex; gap: 10px; z-index: 1000; }
    </style>
</head>
<body>

    <div class="header-panel">
        <input type="text" id="userInput" placeholder="NICKNAME...">
        <button onclick="loadUserShelf(document.getElementById('userInput').value)">INITIALIZE</button>
        <button onclick="showWindow('top-window')" style="border-color:#21ff7a">TOP_LIST</button>
    </div>

    <div id="shelf-window" class="window">
        <div class="win-header">USER_COLLECTION <span onclick="minimize('shelf-window')" style="cursor:pointer">[_]</span></div>
        <div id="shelf-container" style="padding: 20px;"></div>
    </div>

    <script>
        // ... (код до renderShelf идентичен) ...

        function renderShelf(inventory) {
            const container = document.getElementById('shelf-container');
            container.innerHTML = '';
            
            rarityOrder.forEach(r => {
                if(!ALL_ITEMS[r]) return;
                const section = document.createElement('div');
                section.className = 'rarity-section';
                section.innerHTML = `<h2>[${r.toUpperCase()}]</h2><div class="shelf" id="shelf-${r}"></div>`;
                container.appendChild(section);
                
                const shelf = section.querySelector('.shelf');
                ALL_ITEMS[r].forEach(item => {
                    const isFound = inventory[r]?.[item.name];
                    // Добавляем класс редкости для CSS
                    shelf.innerHTML += `
                        <div class="card card-${r}">
                            <img src="${isFound ? SITE_BASE + item.url : SITE_BASE + 'marzigacha/BLANK.gif'}">
                            ${isFound ? `<p class="reward-name">${item.name}</p>` : `
                                <button class="spoiler-btn" onclick="toggleSpoiler(this)">[SHOW_NAME]</button>
                                <p class="hidden-name">${item.name}</p>
                            `}
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
