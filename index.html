<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Полочка Марци</title>
    <style>
        body { background: #090b0e; color: white; font-family: sans-serif; padding: 40px; }
        h1 { text-align: center; color: #a0aec0; }
        .controls { text-align: center; margin-bottom: 30px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #131722; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #2d3748; position: relative; }
        .card img { width: 100px; height: 100px; object-fit: contain; }
        .count { position: absolute; top: 5px; right: 5px; background: #e74c3c; padding: 2px 8px; border-radius: 50%; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Полочка Марци</h1>
    <div class="controls">
        <input type="text" id="userInput" placeholder="Введи ник...">
        <button onclick="loadShelf()">Показать</button>
    </div>
    <div id="shelf" class="shelf"></div>

    <script>
        const SITE_BASE = 'https://marzipanica.github.io/marzi-shelf/';
        const SHEET_API_URL = 'https://sheetdb.io/api/v1/4pzptctzinluq';

        // Порядок сортировки (от самого редкого к обычному)
        const rarityOrder = {
            'mythic': 1,
            'legendary': 2,
            'epic': 3,
            'exclusive': 4,
            'ultrarare': 5,
            'rare': 6,
            'common': 7
        };

        async function loadShelf() {
            const user = document.getElementById('userInput').value.toLowerCase();
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = 'Загрузка...';
            
            try {
                const res = await fetch(SHEET_API_URL);
                const data = await res.json();
                
                const inventory = {};
                data.filter(i => i.Ник.toLowerCase() === user).forEach(i => {
                    if (!inventory[i.Предмет]) {
                        inventory[i.Предмет] = { count: 0, img: i.Картинка, rarity: i.Редкость ? i.Редкость.toLowerCase() : 'common' };
                    }
                    inventory[i.Предмет].count += 1;
                });
                
                // Превращаем в массив для сортировки
                const sortedItems = Object.entries(inventory).sort((a, b) => {
                    return (rarityOrder[a[1].rarity] || 99) - (rarityOrder[b[1].rarity] || 99);
                });
                
                shelf.innerHTML = sortedItems.length === 0 ? '<p>Ничего не найдено.</p>' : '';
                
                sortedItems.forEach(([name, item]) => {
                    const imgUrl = item.img.startsWith('http') ? item.img : SITE_BASE + item.img;
                    shelf.innerHTML += `
                        <div class="card">
                            <span class="count">${item.count}</span>
                            <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/100'">
                            <p style="font-size: 12px;">${name}</p>
                        </div>
                    `;
                });
            } catch(e) { shelf.innerHTML = 'Ошибка загрузки.'; }
        }
    </script>
</body>
</html>
